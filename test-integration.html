<!DOCTYPE html>
<html>
<head>
    <title>Integration Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        iframe {
            width: 100%;
            height: 600px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 20px;
        }
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Integration Configuration Test</h1>
    
    <div class="test-section">
        <h2>1. Database Status</h2>
        <div id="db-status"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Dashboard View (should show onboarding message)</h2>
        <iframe src="http://localhost:8081/jarvis.html" id="dashboard-frame"></iframe>
    </div>
    
    <div class="test-section">
        <h2>3. CSV Upload Test</h2>
        <button onclick="testCSVUpload()">Test CSV Upload</button>
        <div id="csv-status"></div>
    </div>
    
    <script>
        // Check database status
        async function checkDatabase() {
            const statusDiv = document.getElementById('db-status');
            try {
                const response = await fetch('http://localhost:8081/api/tickets/stats');
                const data = await response.json();
                
                statusDiv.innerHTML = `
                    <p class="${data.hasData ? 'error' : 'success'}">
                        ✓ Database check: ${data.hasData ? 'Has data (unexpected)' : 'No data (correct)'}
                    </p>
                    <p class="info">Total tickets: ${data.stats.total_tickets}</p>
                    <p class="info">API Response:</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                statusDiv.innerHTML = `<p class="error">✗ Error: ${error.message}</p>`;
            }
        }
        
        // Test CSV upload
        async function testCSVUpload() {
            const statusDiv = document.getElementById('csv-status');
            statusDiv.innerHTML = '<p class="info">Testing CSV upload...</p>';
            
            try {
                // Create a simple CSV
                const csvContent = `ticket_id,title,description,status,priority,category,created_at,resolved_at,resolution_time_minutes
TEST-001,Test Ticket,Testing upload,resolved,high,Test,2024-01-15T10:00:00Z,2024-01-15T10:15:00Z,15`;
                
                const formData = new FormData();
                const blob = new Blob([csvContent], { type: 'text/csv' });
                formData.append('file', blob, 'test.csv');
                
                const response = await fetch('http://localhost:8081/api/tickets/import', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    statusDiv.innerHTML = `
                        <p class="success">✓ CSV upload successful</p>
                        <p class="info">Imported ${result.imported} tickets</p>
                    `;
                    
                    // Refresh database status
                    setTimeout(checkDatabase, 1000);
                } else {
                    statusDiv.innerHTML = `<p class="error">✗ Upload failed: ${result.error}</p>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<p class="error">✗ Error: ${error.message}</p>`;
            }
        }
        
        // Initial check
        checkDatabase();
        
        // Refresh dashboard iframe
        setTimeout(() => {
            document.getElementById('dashboard-frame').src = 
                'http://localhost:8081/jarvis.html?t=' + Date.now();
        }, 2000);
    </script>
</body>
</html>
