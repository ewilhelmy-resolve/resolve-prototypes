<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI Chat - Mock Interface</title>
    
    <!-- Import Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Context-aware styles -->
    <link rel="stylesheet" href="styles/jarvis-context.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0B1E3C; /* Primary Background */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            background: rgba(11, 30, 60, 0.95);
            padding: 15px 20px;
            box-shadow: 0 2px 10px rgba(0, 157, 255, 0.1);
            border-bottom: 1px solid rgba(41, 197, 246, 0.2);
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        
        .resolve-logo {
            height: 40px;
            width: auto;
            filter: brightness(0) invert(1);
            opacity: 0.9;
        }
        
        .jarvis-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .jarvis-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #009DFF, #29C5F6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-weight: 600;
            font-size: 18px;
            box-shadow: 0 0 20px rgba(0, 157, 255, 0.3);
        }
        
        .chat-title {
            flex: 1;
        }
        
        .chat-title h1 {
            font-size: 18px;
            color: #FFFFFF;
            margin-bottom: 2px;
            font-weight: 600;
        }
        
        .chat-title .status {
            font-size: 12px;
            color: #28B7B5;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #28B7B5;
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-shadow: 0 0 10px rgba(40, 183, 181, 0.5);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chat-container {
            flex: 1;
            background: #0B1E3C;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            animation: slideIn 0.3s ease;
            font-size: 14px;
            line-height: 1.5;
            font-weight: 400;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.bot {
            background: rgba(209, 213, 219, 0.1);
            color: #FFFFFF;
            align-self: flex-start;
            border: 1px solid rgba(209, 213, 219, 0.2);
            box-shadow: 0 2px 8px rgba(0, 157, 255, 0.1);
        }
        
        .message.user {
            background: linear-gradient(135deg, #009DFF, #3B82F6);
            color: #FFFFFF;
            align-self: flex-end;
            box-shadow: 0 2px 8px rgba(0, 157, 255, 0.2);
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 15px;
            background: rgba(209, 213, 219, 0.1);
            border: 1px solid rgba(209, 213, 219, 0.2);
            border-radius: 12px;
            width: fit-content;
            box-shadow: 0 2px 8px rgba(0, 157, 255, 0.1);
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #28B7B5;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
            box-shadow: 0 0 5px rgba(40, 183, 181, 0.5);
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% {
                transform: scale(1);
                opacity: 0.5;
            }
            40% {
                transform: scale(1.3);
                opacity: 1;
            }
        }
        
        .input-container {
            background: rgba(11, 30, 60, 0.95);
            padding: 15px;
            border-top: 1px solid rgba(41, 197, 246, 0.2);
            display: flex;
            gap: 10px;
        }
        
        .input-field {
            flex: 1;
            padding: 10px 15px;
            background: rgba(209, 213, 219, 0.1);
            border: 1px solid rgba(209, 213, 219, 0.2);
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            color: #FFFFFF;
            transition: all 0.3s;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }
        
        .input-field::placeholder {
            color: rgba(209, 213, 219, 0.5);
        }
        
        .input-field:focus {
            border-color: #009DFF;
            background: rgba(209, 213, 219, 0.15);
            box-shadow: 0 0 10px rgba(0, 157, 255, 0.2);
        }
        
        .send-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #009DFF, #3B82F6);
            border: none;
            color: #FFFFFF;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 10px rgba(0, 157, 255, 0.3);
        }
        
        .send-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 157, 255, 0.4);
        }
        
        .send-button:active {
            transform: scale(0.95);
        }
        
        .quick-actions {
            padding: 10px 15px;
            background: rgba(11, 30, 60, 0.95);
            border-top: 1px solid rgba(41, 197, 246, 0.2);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .quick-action {
            padding: 8px 14px;
            background: rgba(209, 213, 219, 0.1);
            border: 1px solid rgba(209, 213, 219, 0.2);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            color: #D1D5DB;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }
        
        .quick-action:hover {
            background: #3B82F6;
            color: #FFFFFF;
            border-color: #3B82F6;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="jarvis-context">
    <div class="chat-header">
        <div class="header-content">
            <img src="logo.svg" alt="Resolve Logo" class="resolve-logo">
            <div class="jarvis-section">
                <div class="jarvis-logo">J</div>
                <div class="chat-title">
                    <h1>Jarvis AI Assistant</h1>
                    <div class="status">
                        <span class="status-dot"></span>
                        <span>Online - Ready to help</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="chat-container" id="chatContainer">
        <div class="message bot">
            👋 Hello! I'm Jarvis, your AI-powered IT assistant. I'm here to help automate your IT tickets and resolve issues quickly.
        </div>
        <div class="message bot">
            I can help you with:
            <br>• Password resets
            <br>• Software installations
            <br>• Network issues
            <br>• Hardware requests
            <br>• And much more!
        </div>
    </div>
    
    <div class="quick-actions">
        <button class="quick-action" onclick="addQuickMessage('Reset my password')">Reset password</button>
        <button class="quick-action" onclick="addQuickMessage('Install software')">Install software</button>
        <button class="quick-action" onclick="addQuickMessage('Network issue')">Network issue</button>
        <button class="quick-action" onclick="addQuickMessage('New hardware')">Request hardware</button>
    </div>
    
    <div class="input-container">
        <input type="text" class="input-field" id="messageInput" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
        <button class="send-button" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/>
            </svg>
        </button>
    </div>
    
    <script>
        const responses = [
            "I understand your request. Let me help you with that.",
            "I'm processing your request now. This should only take a moment.",
            "Great question! Here's what I can do for you...",
            "I've initiated the process. You should see results shortly.",
            "That's a common issue. I have the perfect solution for you.",
            "I'm analyzing the best approach to resolve this for you.",
            "Consider it done! I'm working on that right now.",
            "I've found a solution that should work perfectly for your needs."
        ];
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message) {
                addUserMessage(message);
                input.value = '';
                
                // Show typing indicator
                showTyping();
                
                // Simulate bot response
                setTimeout(() => {
                    removeTyping();
                    const response = responses[Math.floor(Math.random() * responses.length)];
                    addBotMessage(response);
                }, 1500 + Math.random() * 1500);
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function addUserMessage(text) {
            const container = document.getElementById('chatContainer');
            const message = document.createElement('div');
            message.className = 'message user';
            message.textContent = text;
            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
        }
        
        function addBotMessage(text) {
            const container = document.getElementById('chatContainer');
            const message = document.createElement('div');
            message.className = 'message bot';
            message.innerHTML = text;
            container.appendChild(message);
            container.scrollTop = container.scrollHeight;
        }
        
        function showTyping() {
            const container = document.getElementById('chatContainer');
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typingIndicator';
            typing.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;
        }
        
        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) {
                typing.remove();
            }
        }
        
        function addQuickMessage(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }
        
        // Notify parent window that Jarvis is loaded
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'jarvis-loaded', status: 'ready' }, '*');
        }
    </script>
</body>
</html>
