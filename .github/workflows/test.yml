name: Type Check & Unit Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '*.txt'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '*.txt'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - run: pnpm install --frozen-lockfile

    - name: Cache TypeScript build info
      uses: actions/cache@v4
      with:
        path: |
          packages/client/.tsbuildinfo
          packages/api-server/.tsbuildinfo
        key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('packages/*/src/**/*.ts', 'packages/*/src/**/*.tsx') }}
        restore-keys: |
          tsbuildinfo-${{ runner.os }}-

    - name: Type check (all packages)
      run: pnpm -r run type-check
      env:
        NODE_OPTIONS: --max-old-space-size=4096

    - name: Lint (all packages)
      run: pnpm -r run lint

    - name: Run API server unit tests
      run: pnpm --filter rita-api-server test:run

    - name: Run client unit tests
      run: pnpm --filter rita-client test:unit

