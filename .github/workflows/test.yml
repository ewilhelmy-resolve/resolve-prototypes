name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
    
    - name: Start backend server
      run: |
        npm start &
        sleep 5
    
    - name: Run E2E tests
      run: npx playwright test
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  docker-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker images
      run: docker-compose -f docker-compose.full.yml build
    
    - name: Start services
      run: docker-compose -f docker-compose.full.yml up -d frontend backend
    
    - name: Wait for services
      run: |
        echo "Waiting for backend to be healthy..."
        timeout 60 bash -c 'until curl -f http://localhost:8082/health; do sleep 2; done'
    
    - name: Run Docker tests
      run: docker-compose -f docker-compose.full.yml --profile test run test-runner
    
    - name: Upload Docker test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: docker-test-results
        path: |
          test-results/
          playwright-report/
        retention-days: 30
    
    - name: Stop services
      if: always()
      run: docker-compose -f docker-compose.full.yml down -v