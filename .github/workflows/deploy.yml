name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/resolve-io/resolve-onboarding
  DEPLOY_HOST: onboarding.resolve.io
  DEPLOY_USER: ec2-user

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.ONBOARDING_GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:latest .

      - name: Push Docker image to GHCR
        run: docker push $IMAGE_NAME:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH into internal host and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_ONBOARDING_SSH_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} --password ${{ secrets.ONBOARDING_GITHUB_TOKEN }}
            docker pull $IMAGE_NAME:latest
            docker stop hello-world-container || true
            docker rm hello-world-container || true
            docker run -d --name hello-world-container $IMAGE_NAME:latest
