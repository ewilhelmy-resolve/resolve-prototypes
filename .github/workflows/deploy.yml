name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/resolve-io/resolve-onboarding
  DEPLOY_HOST: ec2-54-147-199-139.compute-1.amazonaws.com
  DEPLOY_USER: ec2-user

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.ONBOARDING_GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image to GHCR
        run: docker push ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH into internal host and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_ONBOARDING_SSH_KEY }}
          script: |
            IMAGE_NAME=ghcr.io/resolve-io/resolve-onboarding
            echo "${{ secrets.ONBOARDING_GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/onboarding
            
            # First check what architecture we're on
            echo "Checking system architecture..."
            uname -m
            docker version
            
            # Update docker-compose.yml to use the correct image
            cat > docker-compose.yml << 'EOF'
            version: '3.8'
            services:
              app:
                image: onboarding_app:latest
                ports:
                  - "80:5000"
                  - "5000:5000"
                environment:
                  - NODE_ENV=production
                  - PORT=5000
                  - DATABASE_URL=postgresql://resolve_user:resolve_pass@postgres:5432/resolve_onboarding
                volumes:
                  - ./uploads:/app/uploads
                networks:
                  - resolve-network
                depends_on:
                  postgres:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
                  interval: 30s
                  timeout: 3s
                  retries: 3
                  start_period: 10s
              postgres:
                image: postgres:15
                environment:
                  POSTGRES_DB: resolve_onboarding
                  POSTGRES_USER: resolve_user
                  POSTGRES_PASSWORD: resolve_pass
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                ports:
                  - "5432:5432"
                networks:
                  - resolve-network
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U resolve_user -d resolve_onboarding"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
            volumes:
              postgres_data:
            networks:
              resolve-network:
                driver: bridge
            EOF
            
            # COMPLETE RESET - Use specific pgvector version
            echo "🔄 USING PGVECTOR 0.8.0 WITH POSTGRES 15"
            
            # Stop and remove ALL containers and volumes  
            docker-compose down -v
            
            # Remove any cached postgres images
            docker rmi postgres:15 2>/dev/null || true
            
            # Pull standard postgres image
            echo "Pulling postgres:15..."
            docker pull postgres:15
            
            # Pull app image
            docker pull $IMAGE_NAME:latest
            docker tag $IMAGE_NAME:latest onboarding_app:latest
            docker image prune -f
            
            # Start containers with the specific pgvector image
            docker-compose up -d
            
            # Wait for postgres to be fully ready
            echo "Waiting for PostgreSQL to be ready..."
            for i in {1..30}; do
              if docker-compose exec -T postgres pg_isready -U resolve_user -d resolve_onboarding; then
                echo "PostgreSQL is ready!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done
            
            # Install pgvector manually in the running container
            echo "Installing pgvector extension manually..."
            docker-compose exec -T postgres sh << 'INSTALL_EOF'
            apk update
            apk add --no-cache git make gcc musl-dev postgresql15-dev
            cd /tmp
            git clone --branch v0.5.1 https://github.com/pgvector/pgvector.git
            cd pgvector
            make
            make install
            INSTALL_EOF
            
            # Now create the extension
            echo "Creating pgvector extension in database..."
            docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "CREATE EXTENSION IF NOT EXISTS vector;"
            
            # Recreate admin user
            echo "Creating admin@resolve.io user..."
            docker-compose exec -T app sh -c "npm install bcryptjs && node -e \"
              const bcrypt = require('bcryptjs');
              const { Pool } = require('pg');
              const pool = new Pool({ connectionString: process.env.DATABASE_URL });
              
              (async () => {
                const hashedPassword = await bcrypt.hash('admin123', 10);
                // First ensure is_admin column exists
                await pool.query('ALTER TABLE users ADD COLUMN IF NOT EXISTS is_admin BOOLEAN DEFAULT FALSE');
                await pool.query(
                  'INSERT INTO users (email, password, full_name, is_admin, created_at) VALUES (\$1, \$2, \$3, true, NOW()) ON CONFLICT (email) DO UPDATE SET is_admin = true, full_name = \$3',
                  ['admin@resolve.io', hashedPassword, 'Admin User']
                );
                console.log('✅ Admin user created/updated: admin@resolve.io');
                await pool.end();
              })();
            \"" || echo "Note: Admin user creation attempted"
            
            # Verify pgvector is working
            echo "Verifying pgvector installation..."
            if docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "SELECT '[1,2,3]'::vector as test;"; then
              echo "✅ pgvector successfully installed and working!"
            else
              echo "❌ pgvector test failed!"
              exit 1
            fi
