name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/resolve-io/resolve-onboarding
  DEPLOY_HOST: ec2-54-147-199-139.compute-1.amazonaws.com
  DEPLOY_USER: ec2-user

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.ONBOARDING_GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image to GHCR
        run: docker push ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH into internal host and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_ONBOARDING_SSH_KEY }}
          script: |
            IMAGE_NAME=ghcr.io/resolve-io/resolve-onboarding
            echo "${{ secrets.ONBOARDING_GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/onboarding
            
            # Stop and remove containers
            docker-compose down
            
            # Remove the postgres container and image to force fresh pull
            docker rm -f onboarding-postgres-1 || true
            docker rmi pgvector/pgvector:pg15 || true
            
            # Pull fresh pgvector image
            docker pull pgvector/pgvector:pg15
            
            # Pull app image
            docker pull $IMAGE_NAME:latest
            docker tag $IMAGE_NAME:latest onboarding_app:latest
            docker image prune -f
            
            # Start with fresh postgres container
            docker-compose up -d
            
            # Wait for postgres to be fully ready
            echo "Waiting for PostgreSQL to be ready..."
            for i in {1..30}; do
              if docker-compose exec -T postgres pg_isready -U resolve_user -d resolve_onboarding; then
                echo "PostgreSQL is ready!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done
            
            # Check if pgvector binaries are available in the container
            echo "Checking for pgvector files in container..."
            docker-compose exec -T postgres ls -la /usr/share/postgresql/*/extension/vector* || echo "No vector files in /usr/share"
            docker-compose exec -T postgres ls -la /usr/local/share/postgresql/extension/vector* || echo "No vector files in /usr/local/share"
            
            # Try to install pgvector extension
            echo "Attempting to create pgvector extension..."
            docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "CREATE EXTENSION IF NOT EXISTS vector;" || echo "Failed to create extension"
            
            # Check what extensions are available
            echo "Available extensions:"
            docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "SELECT name FROM pg_available_extensions WHERE name LIKE '%vector%';" || true
            
            # If pgvector is still not available, install it manually in the container
            if ! docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "SELECT '[1,2,3]'::vector" 2>/dev/null; then
              echo "pgvector not found, installing manually in container..."
              docker-compose exec -T postgres bash -c "apt-get update && apt-get install -y build-essential postgresql-server-dev-15 git && cd /tmp && git clone https://github.com/pgvector/pgvector.git && cd pgvector && make && make install" || echo "Manual installation failed"
              docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "CREATE EXTENSION IF NOT EXISTS vector;" || echo "Extension creation failed"
            fi
            
            # Final verification
            echo "Final pgvector status:"
            docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "SELECT extname, extversion FROM pg_extension WHERE extname = 'vector';" || echo "No pgvector extension"
            docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "SELECT '[1,2,3]'::vector as test;" || echo "Vector operations still not working"
