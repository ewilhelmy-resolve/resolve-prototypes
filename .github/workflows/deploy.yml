name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/resolve-io/resolve-onboarding
  DEPLOY_HOST: ec2-54-147-199-139.compute-1.amazonaws.com
  DEPLOY_USER: ec2-user

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.ONBOARDING_GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image to GHCR
        run: docker push ${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH into internal host and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_ONBOARDING_SSH_KEY }}
          script: |
            IMAGE_NAME=ghcr.io/resolve-io/resolve-onboarding
            echo "${{ secrets.ONBOARDING_GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/onboarding
            
            # Stop and remove containers
            docker-compose down
            
            # Pull the ankane/pgvector image which has pgvector pre-installed
            echo "Pulling PostgreSQL image with pgvector..."
            docker pull ankane/pgvector
            
            # Pull app image
            docker pull $IMAGE_NAME:latest
            docker tag $IMAGE_NAME:latest onboarding_app:latest
            docker image prune -f
            
            # Start with fresh postgres container
            docker-compose up -d
            
            # Wait for postgres to be fully ready
            echo "Waiting for PostgreSQL to be ready..."
            for i in {1..30}; do
              if docker-compose exec -T postgres pg_isready -U resolve_user -d resolve_onboarding; then
                echo "PostgreSQL is ready!"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done
            
            # Create pgvector extension
            echo "Creating pgvector extension..."
            docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "CREATE EXTENSION IF NOT EXISTS vector;"
            
            # Verify pgvector is working
            echo "Verifying pgvector installation..."
            docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "SELECT extname, extversion FROM pg_extension WHERE extname = 'vector';"
            docker-compose exec -T postgres psql -U resolve_user -d resolve_onboarding -c "SELECT '[1,2,3]'::vector as test;"
            echo "✅ pgvector successfully installed!"
#            docker stop resolve-onboarding || true
#            docker rm resolve-onboarding || true
#            docker run -d -p 80:80 --name resolve-onboarding $IMAGE_NAME:latest
