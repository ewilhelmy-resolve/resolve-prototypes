name: Deploy to Dev

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main

    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '*.txt'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.ref_name }}-dev
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  GITHUB_REPOSITORY_OWNER: resolve-io
  IMAGE_PREFIX: rita
  DEPLOY_HOST: ${{ vars.DEV_DEPLOY_HOST || 'ec2-52-45-128-201.compute-1.amazonaws.com' }}
  DEPLOY_USER: ${{ vars.DEV_DEPLOY_USER || 'ec2-user' }}

jobs:
  # Validate all required secrets are configured
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate dev secrets
        shell: bash
        run: |
          echo "🔍 Validating required dev secrets..."

          failed=false

          # Frontend build secrets
          if [ -z "${{ secrets.DEV_VITE_KEYCLOAK_URL }}" ]; then
            echo "❌ Missing: DEV_VITE_KEYCLOAK_URL"
            failed=true
          fi
          if [ -z "${{ secrets.DEV_VITE_KEYCLOAK_REALM }}" ]; then
            echo "❌ Missing: DEV_VITE_KEYCLOAK_REALM"
            failed=true
          fi
          if [ -z "${{ secrets.DEV_VITE_KEYCLOAK_CLIENT_ID }}" ]; then
            echo "❌ Missing: DEV_VITE_KEYCLOAK_CLIENT_ID"
            failed=true
          fi

          # Backend infrastructure secrets (only check if deployment is enabled)
          # if [ -z "${{ secrets.DEV_DATABASE_URL }}" ]; then
          #   echo "❌ Missing: DEV_DATABASE_URL"
          #   failed=true
          # fi

          if [ "$failed" = true ]; then
            echo ""
            echo "📋 Please add missing secrets in GitHub repository settings:"
            echo "   Settings → Secrets and variables → Actions → Secrets"
            echo ""
            echo "📖 See docs/DEV_SECRETS_SETUP.md for detailed setup instructions"
            exit 1
          fi

          echo "✅ All required secrets are configured!"

  # Build and push Docker images
  build-and-push:
    runs-on: ubuntu-latest
    needs: validate-secrets
    outputs:
      api-server-image: ${{ steps.meta.outputs.api-server-image }}
      frontend-image: ${{ steps.meta.outputs.frontend-image }}
      short-sha: ${{ steps.meta.outputs.short-sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate metadata
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          API_IMAGE="${{ env.REGISTRY }}/${{ env.GITHUB_REPOSITORY_OWNER }}/${{ env.IMAGE_PREFIX }}-api-server:main-${SHORT_SHA}"
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.GITHUB_REPOSITORY_OWNER }}/${{ env.IMAGE_PREFIX }}-frontend:main-${SHORT_SHA}"

          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "api-server-image=${API_IMAGE}" >> $GITHUB_OUTPUT
          echo "frontend-image=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js for builds
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build API Server
        run: pnpm --filter rita-api-server build

      - name: Build Frontend
        run: pnpm --filter rita-client build
        env:
          # Staging environment variables - using prefixed secrets
          VITE_KEYCLOAK_URL: ${{ secrets.DEV_VITE_KEYCLOAK_URL }}
          VITE_KEYCLOAK_REALM: ${{ secrets.DEV_VITE_KEYCLOAK_REALM }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ secrets.DEV_VITE_KEYCLOAK_CLIENT_ID }}
          VITE_API_URL: ""  # Use relative URLs

      - name: Build and push API Server image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/api-server
          file: ./packages/api-server/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.api-server-image }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/client
          file: ./packages/client/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.frontend-image }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

   #  Deploy to DEV environment
  deploy-dev:
     runs-on: ubuntu-latest
     needs: build-and-push
     steps:
       - name: Deploy to dev server
         uses: appleboy/ssh-action@v1.0.0
         with:
           host: ${{ env.DEPLOY_HOST }}
           username: ${{ env.DEPLOY_USER }}
           key: ${{ secrets.DEPLOY_ONBOARDING_SSH_KEY }}
           script: |
             set -e

             # Variables
             API_IMAGE="${{ needs.build-and-push.outputs.api-server-image }}"
             FRONTEND_IMAGE="${{ needs.build-and-push.outputs.frontend-image }}"
             SHORT_SHA="${{ needs.build-and-push.outputs.short-sha }}"

             echo "🚀 Starting dev deployment for commit $SHORT_SHA"

             # Login to registry
             echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

             # Create and navigate to deployment directory
             sudo mkdir -p /opt/rita-dev
             cd /opt/rita-dev

             # Stop onboarding deployment if running (to free up port 80)
             echo "🛑 Stopping onboarding deployment..."
             cd /opt/onboarding && docker-compose down --remove-orphans || true
             cd /opt/rita-dev

             # Clean up old Rita images to free space
             echo "🧹 Cleaning up old Rita images..."
             docker rmi $(docker images "ghcr.io/resolve-io/rita-*" -q) 2>/dev/null || true
             docker rmi $(docker images | grep "rita-" | awk '{print $3}') 2>/dev/null || true

             # Check disk space
             echo "💾 Disk space after cleanup:"
             df -h

             # Pull new images
             echo "📦 Pulling new images..."
             docker pull $API_IMAGE
             docker pull $FRONTEND_IMAGE

             # Tag images locally for docker-compose
             docker tag $API_IMAGE rita-api-server:dev
             docker tag $FRONTEND_IMAGE rita-frontend:dev

             # Run database migrations first
             echo "🔄 Running database migrations..."
             if timeout 300 docker run --rm \
               -e DATABASE_URL="${{ secrets.DEV_DATABASE_URL }}" \
               -e NODE_ENV=production \
               rita-api-server:dev \
               node dist/database/migrate.js; then
               echo "✅ Migrations completed successfully"
             else
               echo "❌ Migration failed - deployment aborted"
               echo "📋 Old version continues running"
               echo "🔧 Fix migrations and redeploy"
               echo "📊 Current running services:"
               docker-compose ps || true
               exit 1
             fi

             # Stop current deployment (simple replacement)
             echo "🛑 Stopping current services..."
             docker-compose down --remove-orphans || true

             # Backup current compose file
             sudo cp docker-compose.yml docker-compose.yml.bak 2>/dev/null || true

             # Create dev docker-compose.yml
             echo "📝 Creating dev docker-compose.yml..."
             sudo tee docker-compose.yml > /dev/null << 'EOF'
             version: '3.8'

             services:
               api-server:
                 image: rita-api-server:dev
                 environment:
                   NODE_ENV: production
                   PORT: 3000
                   DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
                   RABBITMQ_URL: ${{ secrets.DEV_RABBITMQ_URL }}
                   KEYCLOAK_URL: ${{ secrets.DEV_KEYCLOAK_URL }}
                   KEYCLOAK_REALM: ${{ secrets.DEV_KEYCLOAK_REALM }}
                   KEYCLOAK_ISSUER: ${{ secrets.DEV_KEYCLOAK_ISSUER }}
                   AUTOMATION_WEBHOOK_URL: ${{ secrets.DEV_AUTOMATION_WEBHOOK_URL }}
                   AUTOMATION_AUTH: ${{ secrets.DEV_AUTOMATION_AUTH }}
                   CLIENT_URL: ${{ secrets.DEV_CLIENT_URL }}
                   CONSUL_HTTP_ADDR: ${{ secrets.DEV_CONSUL_HTTP_ADDR }}
                   CONSUL_HTTP_TOKEN: ${{ secrets.DEV_CONSUL_HTTP_TOKEN }}
                   VALKEY_URL: ${{ secrets.VALKEY_URL_DEV }}
                 healthcheck:
                   test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
                   interval: 30s
                   timeout: 10s
                   retries: 3
                   start_period: 10s
                 restart: unless-stopped
                 networks:
                   - app-network
                   - resolve-shared

               frontend:
                 image: rita-frontend:dev
                 environment:
                   VALKEY_URL: ${{ secrets.VALKEY_URL_DEV }}
                 ports:
                   - "80:80"
                 depends_on:
                   - api-server
                 healthcheck:
                   test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
                   interval: 30s
                   timeout: 10s
                   retries: 3
                 restart: unless-stopped
                 networks:
                   - app-network
                   - resolve-shared

             networks:
               app-network:
                 driver: bridge
               resolve-shared:
                 external: true
             EOF

             # Start new deployment
             echo "🚀 Starting new services..."
             docker-compose up -d

             # Wait for services to be ready
             echo "⏳ Waiting for services to start..."
             sleep 30

             # Check container status and logs before health checks
             echo "🔍 Checking container status..."
             docker-compose ps
             echo "📋 API Server logs:"
             docker-compose logs --tail=30 api-server
             echo "📋 Frontend logs:"
             docker-compose logs --tail=30 frontend

             # Health checks
             echo "🏥 Running health checks..."
             if curl -f http://localhost/health 2>/dev/null; then
               echo "✅ Frontend health check passed"
             else
               echo "⚠️ Frontend health check failed, but container is running"
             fi

             if curl -f http://localhost:3000/health 2>/dev/null; then
               echo "✅ API Server health check passed"
             else
               echo "⚠️ API Server health check failed, but container is running"
             fi

             echo "🎉 Dev deployment successful!"
             echo "📊 Deployment info:"
             echo "  - Commit SHA: $SHORT_SHA"
             echo "  - API Image: $API_IMAGE"
             echo "  - Frontend Image: $FRONTEND_IMAGE"
             echo "  - Deployed at: $(date)"
  # Trigger QA Wolf tests           
  trigger-qawolf:
    needs: deploy-dev
    name: Notify QA Wolf
    runs-on: ubuntu-latest
    steps:
      - name: Notify QA Wolf of deployment
        uses: qawolf/notify-qawolf-on-deploy-action@v1
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          # Required: QA Wolf API key from workspace settings page
          qawolf-api-key: "${{ secrets.RITAGO_QAWOLF_API_KEY }}"
          # Deployment type to match specific triggers
          deployment-type: "deployment"

  
