<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI Proxy Frame</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe 
        id="jarvisFrame"
        src="https://resolvejarvisdev.espressive.com/v2/chat/"
        allow="microphone; camera; clipboard-read; clipboard-write"
        allowfullscreen>
    </iframe>
    
    <script>
        // Post messages to parent window
        window.addEventListener('message', function(e) {
            // Forward messages from Jarvis to parent
            if (e.origin === 'https://resolvejarvisdev.espressive.com') {
                window.parent.postMessage(e.data, '*');
            }
        });
        
        // Notify parent that iframe is loaded
        window.addEventListener('load', function() {
            window.parent.postMessage({ type: 'jarvis-proxy-loaded' }, '*');
        });
    </script>
</body>
</html>
