version: '3.8'

services:
  app:
    image: ${IMAGE_NAME:-resolve-onboarding-app}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:5000"
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://resolve_user:resolve_pass@postgres:5432/resolve_onboarding
      - NODE_OPTIONS=--max-old-space-size=2048
    volumes:
      - ./uploads:/app/uploads
    networks:
      - resolve-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    # Set memory limits to prevent container from consuming all available memory
    mem_limit: 2g
    mem_reservation: 1g

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: resolve_onboarding
      POSTGRES_USER: resolve_user
      POSTGRES_PASSWORD: resolve_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - resolve-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolve_user -d resolve_onboarding"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  resolve-network:
    driver: bridge