version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "80:5000"
      - "5000:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - resolve-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    env_file:
      - .env

  # PostgreSQL container - commented out when using Supabase
  # Uncomment this section if you want to use local PostgreSQL instead of Supabase
  # postgres:
  #   image: pgvector/pgvector:pg15
  #   environment:
  #     POSTGRES_DB: resolve_onboarding
  #     POSTGRES_USER: resolve_user
  #     POSTGRES_PASSWORD: resolve_pass
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./src/database:/docker-entrypoint-initdb.d
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - resolve-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U resolve_user -d resolve_onboarding"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  postgres_data:

networks:
  resolve-network:
    driver: bridge