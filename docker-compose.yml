version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8082:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_TYPE=sqlite
      - DATABASE_PATH=/app/database.db
    volumes:
      - ./uploads:/app/uploads
      - ./database.db:/app/database.db
    networks:
      - resolve-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: resolve_onboarding
      POSTGRES_USER: resolve_user
      POSTGRES_PASSWORD: resolve_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - resolve-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolve_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  resolve-network:
    driver: bridge