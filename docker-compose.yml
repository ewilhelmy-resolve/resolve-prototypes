services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.simple
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=production
      - PORT=8082
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s