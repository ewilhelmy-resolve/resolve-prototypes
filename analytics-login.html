<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0A0A0F 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066FF, #00D4FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: #8B8B9F;
            font-size: 14px;
        }
        
        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FF4444, #FF6666);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            color: #8B8B9F;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #0066FF;
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0066FF, #00D4FF);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .btn-login:hover {
            transform: scale(1.02);
        }
        
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: #FF6666;
            font-size: 14px;
            display: none;
        }
        
        .success-message {
            background: rgba(0, 255, 127, 0.1);
            border: 1px solid rgba(0, 255, 127, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            color: #00FF7F;
            font-size: 14px;
            display: none;
        }
        
        .hint-text {
            text-align: center;
            margin-top: 20px;
            color: #8B8B9F;
            font-size: 12px;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1 class="login-title">📊 Analytics Dashboard</h1>
            <p class="login-subtitle">Resolve Marketing Analytics</p>
            <span class="admin-badge">ADMIN ACCESS ONLY</span>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="john@resolve.io"
                    required
                    autocomplete="username"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" class="btn-login" id="loginBtn">
                Access Analytics Dashboard
            </button>
        </form>
        
        <p class="hint-text">
            🔒 This dashboard is restricted to authorized administrators only
        </p>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');
            
            // Hide messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            // Check if admin email
            if (email !== 'john@resolve.io') {
                errorMsg.textContent = '⚠️ Access denied. This dashboard is for administrators only.';
                errorMsg.style.display = 'block';
                return;
            }
            
            // Show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Authenticating<span class="spinner"></span>';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    // Store auth token
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('userEmail', email);
                    
                    // Show success
                    successMsg.textContent = '✅ Authentication successful! Redirecting to dashboard...';
                    successMsg.style.display = 'block';
                    
                    // Redirect to analytics dashboard
                    setTimeout(() => {
                        window.location.href = '/analytics-dashboard.html';
                    }, 1000);
                } else {
                    throw new Error(data.error || 'Invalid credentials');
                }
            } catch (error) {
                errorMsg.textContent = `❌ Login failed: ${error.message}`;
                errorMsg.style.display = 'block';
                
                // Reset button
                loginBtn.disabled = false;
                loginBtn.textContent = 'Access Analytics Dashboard';
            }
        });
        
        // Auto-fill for demo purposes
        document.getElementById('email').value = 'john@resolve.io';
        
        // Check if already logged in
        const checkAuth = async () => {
            const token = localStorage.getItem('authToken');
            const email = localStorage.getItem('userEmail');
            
            if (token && email === 'john@resolve.io') {
                // Verify token is still valid
                try {
                    const response = await fetch('/api/analytics/dashboard', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    
                    if (response.ok) {
                        // Already authenticated, redirect
                        window.location.href = '/analytics-dashboard.html';
                    }
                } catch (error) {
                    // Token invalid, stay on login page
                }
            }
        };
        
        checkAuth();
    </script>
</body>
</html>
