<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolve Analytics Dashboard - Admin Only</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0A0A0F 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .dashboard-header {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dashboard-title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #0066FF, #00D4FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .admin-badge {
            background: linear-gradient(135deg, #FF4444, #FF6666);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .metric-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s ease;
        }
        
        .metric-card:hover {
            transform: translateY(-4px);
            border-color: #0066FF;
        }
        
        .metric-label {
            color: #8B8B9F;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .metric-value {
            font-size: 36px;
            font-weight: 700;
            color: #00D4FF;
            margin-bottom: 8px;
        }
        
        .metric-change {
            font-size: 14px;
            color: #00FF7F;
        }
        
        .metric-change.negative {
            color: #FF4444;
        }
        
        .analytics-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 16px;
            color: #ffffff;
        }
        
        .funnel-container {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 16px 0;
        }
        
        .funnel-step {
            background: rgba(0, 102, 255, 0.1);
            border: 2px solid rgba(0, 102, 255, 0.3);
            border-radius: 12px;
            padding: 16px;
            min-width: 200px;
            text-align: center;
            position: relative;
        }
        
        .funnel-step::after {
            content: '→';
            position: absolute;
            right: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            color: #0066FF;
        }
        
        .funnel-step:last-child::after {
            display: none;
        }
        
        .funnel-step-name {
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .funnel-conversion {
            font-size: 24px;
            color: #00D4FF;
            margin: 8px 0;
        }
        
        .funnel-users {
            font-size: 14px;
            color: #8B8B9F;
        }
        
        .events-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .events-table th {
            background: rgba(0, 102, 255, 0.1);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid rgba(0, 102, 255, 0.3);
        }
        
        .events-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .events-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .event-type {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .event-type.conversion {
            background: rgba(0, 255, 127, 0.2);
            color: #00FF7F;
        }
        
        .event-type.engagement {
            background: rgba(0, 212, 255, 0.2);
            color: #00D4FF;
        }
        
        .event-type.navigation {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
        }
        
        .chart-container {
            height: 300px;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8B8B9F;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #8B8B9F;
        }
        
        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
            text-align: center;
            color: #FF6666;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #0066FF, #00D4FF);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        
        .refresh-btn:hover {
            transform: scale(1.05);
        }
        
        .page-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
        }
        
        .page-metric-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .page-path {
            font-weight: 600;
            margin-bottom: 8px;
            color: #00D4FF;
        }
        
        .page-stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #8B8B9F;
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <h1 class="dashboard-title">📊 Resolve Analytics Dashboard</h1>
        <div style="display: flex; gap: 16px; align-items: center;">
            <span class="admin-badge">ADMIN ACCESS</span>
            <button class="refresh-btn" onclick="loadAnalytics()">🔄 Refresh</button>
        </div>
    </div>
    
    <div id="dashboardContent">
        <div class="loading">Loading analytics data...</div>
    </div>
    
    <script>
        let authToken = null;
        
        // Check if user is logged in as admin
        async function checkAuth() {
            authToken = localStorage.getItem('authToken');
            const userEmail = localStorage.getItem('userEmail');
            
            if (!authToken || userEmail !== 'john@resolve.io') {
                // Redirect to login page
                window.location.href = '/analytics-login.html';
                return false;
            }
            
            // Verify token is still valid
            try {
                const response = await fetch('/api/analytics/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                if (!response.ok) {
                    // Token invalid or expired
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('userEmail');
                    window.location.href = '/analytics-login.html';
                    return false;
                }
            } catch (error) {
                window.location.href = '/analytics-login.html';
                return false;
            }
            
            return true;
        }
        
        // Load analytics data
        async function loadAnalytics() {
            if (!await checkAuth()) return;
            
            document.getElementById('dashboardContent').innerHTML = '<div class="loading">Loading analytics data...</div>';
            
            try {
                const response = await fetch('/api/analytics/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to load analytics');
                }
                
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error('Analytics error:', error);
                document.getElementById('dashboardContent').innerHTML = `
                    <div class="error-message">
                        ❌ Failed to load analytics data<br>
                        <small>${error.message}</small>
                    </div>
                `;
            }
        }
        
        // Render the dashboard
        function renderDashboard(data) {
            const totalConversions = data.conversion_stats?.reduce((sum, stat) => sum + stat.total_conversions, 0) || 0;
            const totalRevenue = data.conversion_stats?.reduce((sum, stat) => sum + (stat.total_value || 0), 0) || 0;
            const uniqueUsers = new Set(data.recent_events?.map(e => e.user_email).filter(e => e)).size;
            
            let html = `
                <!-- Key Metrics -->
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-label">Total Events</div>
                        <div class="metric-value">${data.total_events || 0}</div>
                        <div class="metric-change">All time</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Unique Users</div>
                        <div class="metric-value">${uniqueUsers}</div>
                        <div class="metric-change">From recent events</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Total Conversions</div>
                        <div class="metric-value">${totalConversions}</div>
                        <div class="metric-change">All conversion types</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Revenue Potential</div>
                        <div class="metric-value">$${totalRevenue.toFixed(0)}</div>
                        <div class="metric-change">Based on tier selections</div>
                    </div>
                </div>
                
                <!-- Funnel Analysis -->
                <div class="analytics-section">
                    <h2 class="section-title">🔄 Onboarding Funnel</h2>
                    <div class="funnel-container">
            `;
            
            if (data.funnel_stats && data.funnel_stats.length > 0) {
                data.funnel_stats.forEach((step, index) => {
                    const conversionRate = step.total_users > 0 ? 
                        ((step.completed_users / step.total_users) * 100).toFixed(1) : 0;
                    
                    html += `
                        <div class="funnel-step">
                            <div class="funnel-step-name">${step.step_name}</div>
                            <div class="funnel-conversion">${conversionRate}%</div>
                            <div class="funnel-users">${step.completed_users || 0}/${step.total_users} users</div>
                            <div class="funnel-users">Avg: ${Math.round(step.avg_time_spent || 0)}s</div>
                        </div>
                    `;
                });
            } else {
                html += '<p style="color: #8B8B9F;">No funnel data available yet</p>';
            }
            
            html += `
                    </div>
                </div>
                
                <!-- Page Metrics -->
                <div class="analytics-section">
                    <h2 class="section-title">📄 Page Performance</h2>
                    <div class="page-metrics">
            `;
            
            if (data.page_stats && data.page_stats.length > 0) {
                data.page_stats.slice(0, 6).forEach(page => {
                    html += `
                        <div class="page-metric-item">
                            <div class="page-path">${page.page_path}</div>
                            <div class="page-stats">
                                <span>Views: ${page.views}</span>
                                <span>Avg: ${Math.round(page.avg_time || 0)}s</span>
                            </div>
                            <div class="page-stats">
                                <span>Scroll: ${Math.round(page.avg_scroll_depth || 0)}%</span>
                                <span>Clicks: ${page.total_clicks || 0}</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += '<p style="color: #8B8B9F;">No page metrics available yet</p>';
            }
            
            html += `
                    </div>
                </div>
                
                <!-- Conversion Breakdown -->
                <div class="analytics-section">
                    <h2 class="section-title">💰 Conversion Analysis</h2>
                    <div class="page-metrics">
            `;
            
            if (data.conversion_stats && data.conversion_stats.length > 0) {
                const conversionsByType = {};
                data.conversion_stats.forEach(stat => {
                    if (!conversionsByType[stat.conversion_type]) {
                        conversionsByType[stat.conversion_type] = {
                            total: 0,
                            value: 0,
                            tiers: {}
                        };
                    }
                    conversionsByType[stat.conversion_type].total += stat.total_conversions;
                    conversionsByType[stat.conversion_type].value += stat.total_value || 0;
                    if (stat.tier_selected) {
                        conversionsByType[stat.conversion_type].tiers[stat.tier_selected] = stat.total_conversions;
                    }
                });
                
                Object.entries(conversionsByType).forEach(([type, data]) => {
                    html += `
                        <div class="page-metric-item">
                            <div class="page-path">${type.replace(/_/g, ' ').toUpperCase()}</div>
                            <div class="page-stats">
                                <span>Count: ${data.total}</span>
                                <span>Value: $${data.value.toFixed(0)}</span>
                            </div>
                            ${Object.keys(data.tiers).length > 0 ? `
                                <div class="page-stats">
                                    ${Object.entries(data.tiers).map(([tier, count]) => 
                                        `<span>${tier}: ${count}</span>`
                                    ).join('')}
                                </div>
                            ` : ''}
                        </div>
                    `;
                });
            } else {
                html += '<p style="color: #8B8B9F;">No conversion data available yet</p>';
            }
            
            html += `
                    </div>
                </div>
                
                <!-- Recent Events -->
                <div class="analytics-section">
                    <h2 class="section-title">📋 Recent Events (Last 20)</h2>
                    <table class="events-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>User</th>
                                <th>Event</th>
                                <th>Category</th>
                                <th>Page</th>
                                <th>Data</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            if (data.recent_events && data.recent_events.length > 0) {
                data.recent_events.slice(0, 20).forEach(event => {
                    const eventTime = new Date(event.timestamp).toLocaleString();
                    const eventData = event.event_data ? JSON.parse(event.event_data) : {};
                    const dataStr = Object.entries(eventData)
                        .slice(0, 2)
                        .map(([k, v]) => `${k}: ${JSON.stringify(v)}`)
                        .join(', ');
                    
                    html += `
                        <tr>
                            <td>${eventTime}</td>
                            <td>${event.user_email || 'Anonymous'}</td>
                            <td>${event.event_type}</td>
                            <td><span class="event-type ${event.event_category}">${event.event_category}</span></td>
                            <td>${new URL(event.page_url || '').pathname}</td>
                            <td style="font-size: 12px; color: #8B8B9F;">${dataStr}</td>
                        </tr>
                    `;
                });
            } else {
                html += '<tr><td colspan="6" style="text-align: center; color: #8B8B9F;">No events recorded yet</td></tr>';
            }
            
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            
            document.getElementById('dashboardContent').innerHTML = html;
        }
        
        // Auto-refresh every 30 seconds
        setInterval(loadAnalytics, 30000);
        
        // Initial load
        loadAnalytics();
    </script>
</body>
</html>
