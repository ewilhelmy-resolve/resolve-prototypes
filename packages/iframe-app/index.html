<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITA Iframe Embed Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 18px;
        }

        h3 {
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 15px;
        }

        label {
            font-weight: 600;
            color: #333;
        }

        input[type="text"] {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 250px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 200px;
            background: white;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: translateY(1px);
        }

        button.secondary {
            background: #6c757d;
        }

        button.secondary:hover {
            background: #5a6268;
        }

        button.success {
            background: #28a745;
        }

        button.success:hover {
            background: #218838;
        }

        button.workflow {
            background: #9333ea;
        }

        button.workflow:hover {
            background: #7e22ce;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .iframe-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: calc(100vh - 350px);
            min-height: 500px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
            background: white;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .message-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-controls textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        .message-controls textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .log-panel {
            flex: 1;
            min-height: 200px;
            max-height: 400px;
        }

        .log-panel pre {
            background: #1a1a2e;
            color: #eee;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            overflow-y: auto;
            height: 250px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .log-entry {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }

        .log-entry.incoming {
            color: #4ade80;
        }

        .log-entry.outgoing {
            color: #60a5fa;
        }

        .log-entry.error {
            color: #f87171;
        }

        .log-entry.workflow {
            color: #c084fc;
        }

        .log-timestamp {
            color: #888;
            font-size: 10px;
        }

        .info {
            background: #e8f4fd;
            border: 1px solid #2196f3;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
        }

        .info strong {
            color: #1565c0;
        }

        .info code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #d63384;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.ready {
            background: #28a745;
        }

        .status-indicator.waiting {
            background: #ffc107;
        }

        .status-indicator.error {
            background: #dc3545;
        }

        .section-divider {
            border-top: 1px solid #e0e0e0;
            margin: 15px 0;
            padding-top: 15px;
        }

        .workflow-section {
            background: #faf5ff;
            border: 1px solid #9333ea;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .workflow-section h3 {
            color: #7e22ce;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>RITA Iframe Embed Demo</h1>
            <p>Test the iframe-embeddable chat with postMessage API for host page communication.</p>

            <div class="controls">
                <label for="token">Token:</label>
                <input
                    type="text"
                    id="token"
                    placeholder="dev-iframe-token-2024"
                    value="dev-iframe-token-2024"
                >
                <label for="intentEid">Intent EID:</label>
                <input
                    type="text"
                    id="intentEid"
                    placeholder="e.g., test-123"
                    value="demo-001"
                >
                <button onclick="loadIframe()">Load Iframe</button>
            </div>

            <div class="info">
                <span class="status-indicator" id="statusIndicator"></span>
                <strong>Status:</strong> <span id="connectionStatus">Not loaded</span>
                <br><br>
                <strong>Current URL:</strong> <code id="currentUrl">Not loaded yet</code>
            </div>
        </header>

        <div class="main-grid">
            <div class="iframe-container">
                <iframe id="ritaIframe" src=""></iframe>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h2>Send Message (postMessage API)</h2>
                    <div class="message-controls">
                        <textarea id="messageContent" placeholder="Type message to send...">Hello from host page!</textarea>
                        <div class="controls">
                            <label for="chatSessionId">Chat Session:</label>
                            <input type="text" id="chatSessionId" placeholder="workflow-tab-id" value="workflow-123" style="min-width: 150px;">
                        </div>
                        <div class="controls">
                            <label for="tabInstanceId">Tab Instance:</label>
                            <input type="text" id="tabInstanceId" placeholder="user-connection-id" value="user-456" style="min-width: 150px;">
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button class="success" onclick="sendMessage()">Send Message</button>
                            <button class="secondary" onclick="getStatus()">Get Status</button>
                        </div>
                    </div>

                    <div class="workflow-section">
                        <h3>Execute Workflow (Actions API)</h3>
                        <div class="message-controls">
                            <div class="controls">
                                <label for="jwtToken">JWT Token:</label>
                                <input type="text" id="jwtToken" placeholder="Bearer eyJ..." value="" style="min-width: 100%; font-size: 12px;">
                            </div>
                            <div class="controls">
                                <label for="workflowGuid">Workflow GUID:</label>
                                <input type="text" id="workflowGuid" placeholder="uuid-of-system-workflow" value="" style="min-width: 100%;">
                            </div>
                            <div class="controls">
                                <label for="workflowContext">Context:</label>
                                <select id="workflowContext">
                                    <option value="Workflow">Workflow</option>
                                    <option value="ActivityDesigner">ActivityDesigner</option>
                                </select>
                            </div>
                            <textarea id="workflowInput" placeholder="Type message for workflow...">Help me with this task</textarea>
                            <button class="workflow" onclick="executeWorkflow()">Execute Workflow</button>
                        </div>
                    </div>
                </div>

                <div class="panel log-panel">
                    <h2>Event Log</h2>
                    <pre id="eventLog"></pre>
                    <button class="secondary" onclick="clearLog()" style="margin-top: 10px;">Clear Log</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Default to localhost for development
        const RITA_BASE_URL = 'http://localhost:5173';
        let iframeReady = false;
        let requestCounter = 0;

        function log(message, type = 'info') {
            const logEl = document.getElementById('eventLog');
            const timestamp = new Date().toLocaleTimeString();
            const typeClass = type === 'incoming' ? 'incoming' : type === 'outgoing' ? 'outgoing' : type === 'error' ? 'error' : type === 'workflow' ? 'workflow' : '';

            const entry = document.createElement('div');
            entry.className = `log-entry ${typeClass}`;
            entry.innerHTML = `<span class="log-timestamp">[${timestamp}]</span> ${message}`;

            logEl.insertBefore(entry, logEl.firstChild);
        }

        function clearLog() {
            document.getElementById('eventLog').innerHTML = '';
        }

        function updateStatus(status, type) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('connectionStatus');

            indicator.className = `status-indicator ${type}`;
            statusText.textContent = status;
        }

        function loadIframe() {
            const token = document.getElementById('token').value.trim();
            const intentEid = document.getElementById('intentEid').value.trim();
            const iframe = document.getElementById('ritaIframe');

            if (!token) {
                log('Error: Token is required', 'error');
                return;
            }

            // Build URL with token and optional intent-eid
            let url = `${RITA_BASE_URL}/iframe/chat?token=${encodeURIComponent(token)}`;
            if (intentEid) {
                url += `&intent-eid=${encodeURIComponent(intentEid)}`;
            }

            iframeReady = false;
            updateStatus('Loading...', 'waiting');
            iframe.src = url;
            document.getElementById('currentUrl').textContent = url;

            log(`Loading iframe: ${url}`, 'outgoing');
        }

        function sendMessage() {
            if (!iframeReady) {
                log('Error: Iframe not ready yet', 'error');
                return;
            }

            const content = document.getElementById('messageContent').value.trim();
            const chatSessionId = document.getElementById('chatSessionId').value.trim();
            const tabInstanceId = document.getElementById('tabInstanceId').value.trim();

            if (!content) {
                log('Error: Message content is required', 'error');
                return;
            }

            const requestId = `req_${++requestCounter}`;
            const message = {
                type: 'SEND_MESSAGE',
                payload: {
                    content,
                    ...(chatSessionId && { chatSessionId }),
                    ...(tabInstanceId && { tabInstanceId }),
                },
                requestId,
            };

            const iframe = document.getElementById('ritaIframe');
            iframe.contentWindow.postMessage(message, '*');

            log(`SEND_MESSAGE [${requestId}]: "${content.substring(0, 50)}${content.length > 50 ? '...' : ''}"`, 'outgoing');
        }

        function executeWorkflow() {
            if (!iframeReady) {
                log('Error: Iframe not ready yet', 'error');
                return;
            }

            const jwt = document.getElementById('jwtToken').value.trim();
            const workflowGuid = document.getElementById('workflowGuid').value.trim();
            const chatInput = document.getElementById('workflowInput').value.trim();
            const context = document.getElementById('workflowContext').value;
            const chatSessionId = document.getElementById('chatSessionId').value.trim() || `session-${Date.now()}`;
            const tabInstanceId = document.getElementById('tabInstanceId').value.trim() || `tab-${Date.now()}`;

            if (!jwt) {
                log('Error: JWT token is required for workflow execution', 'error');
                return;
            }
            if (!workflowGuid) {
                log('Error: Workflow GUID is required', 'error');
                return;
            }
            if (!chatInput) {
                log('Error: Workflow input message is required', 'error');
                return;
            }

            const requestId = `req_${++requestCounter}`;
            const message = {
                type: 'EXECUTE_WORKFLOW',
                payload: {
                    jwt: jwt.startsWith('Bearer ') ? jwt : `Bearer ${jwt}`,
                    workflowGuid,
                    chatInput,
                    chatSessionId,
                    tabInstanceId,
                    context,
                },
                requestId,
            };

            const iframe = document.getElementById('ritaIframe');
            iframe.contentWindow.postMessage(message, '*');

            log(`EXECUTE_WORKFLOW [${requestId}]: "${chatInput.substring(0, 40)}${chatInput.length > 40 ? '...' : ''}" → ${workflowGuid.substring(0, 8)}...`, 'workflow');
        }

        function getStatus() {
            if (!iframeReady) {
                log('Error: Iframe not ready yet', 'error');
                return;
            }

            const requestId = `req_${++requestCounter}`;
            const message = {
                type: 'GET_STATUS',
                requestId,
            };

            const iframe = document.getElementById('ritaIframe');
            iframe.contentWindow.postMessage(message, '*');

            log(`GET_STATUS [${requestId}]`, 'outgoing');
        }

        // Listen for messages from iframe
        window.addEventListener('message', (event) => {
            // In production, validate origin
            const { type, requestId, success, error, eventId, data } = event.data || {};

            if (!type) return;

            switch (type) {
                case 'READY':
                    iframeReady = true;
                    updateStatus('Ready', 'ready');
                    log('READY: Iframe initialized and ready for commands', 'incoming');
                    break;

                case 'ACK':
                    if (success) {
                        if (eventId) {
                            log(`ACK [${requestId}]: Workflow started, eventId=${eventId}`, 'workflow');
                        } else {
                            log(`ACK [${requestId}]: Success`, 'incoming');
                        }
                    } else {
                        log(`ACK [${requestId}]: Failed - ${error}`, 'error');
                    }
                    break;

                case 'STATUS':
                    log(`STATUS [${requestId}]: ${JSON.stringify(data)}`, 'incoming');
                    break;

                default:
                    log(`Unknown message type: ${type}`, 'error');
            }
        });

        // Load iframe on page load
        window.addEventListener('DOMContentLoaded', () => {
            updateStatus('Not loaded', 'waiting');
            log('Demo page loaded. Click "Load Iframe" to start.', 'info');
        });
    </script>
</body>
</html>
