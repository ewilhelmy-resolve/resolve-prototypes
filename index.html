<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolve Onboarding</title>
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="onboarding-container">
        <div class="form-section">
            <div class="form-container">
                <div class="step-header">
                    <div class="rt-Badge">Step 1 of 2</div>
                    <div class="header-text">
                        <h1 class="season-heading">Start your automation journey</h1>
                        <p>Take 2 minutes to share your goals and challenges with IT automation.</p>
                    </div>
                </div>

                <form class="onboarding-form" id="signup-form">
                    <div class="form-field">
                        <label for="fullName">Full name</label>
                        <input type="text" id="fullName" name="fullName" class="rt-TextField-Input" placeholder="First and last name" required>
                    </div>
                    
                    <div class="form-field">
                        <label for="email">Work email</label>
                        <input type="email" id="email" name="email" class="rt-TextField-Input" placeholder="you@acme.com" required>
                    </div>
                    
                    <div class="form-field">
                        <label for="company">Company name</label>
                        <input type="text" id="company" name="company" class="rt-TextField-Input" placeholder="Acme" required>
                    </div>
                    
                    <div class="form-field">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="rt-TextField-Input" placeholder="Enter password" required>
                    </div>

                    <div class="nav-buttons" style="display: flex; justify-content: space-between; align-items: center; margin-top: 2rem;">
                        <div class="signin-link" style="color: #666; display: flex; flex-direction: column; align-items: flex-start;">
                            <span>Already have an account?</span>
                            <a href="/signin" style="color: #0066ff; text-decoration: none;">Sign in here</a>
                        </div>
                        <button type="submit" class="rt-Button rt-variant-outline">Continue</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="graphic-section">
            <div class="background-workflow">
                <div class="bg-workflow-node">
                    <span class="bg-node-text">Trigger</span>
                    <div class="bg-node-toggle"></div>
                </div>
                <div class="bg-workflow-node">
                    <span class="bg-node-text">if-Else- if Else</span>
                    <div class="bg-node-toggle"></div>
                </div>
                <div class="bg-workflow-node">
                    <span class="bg-node-text">ActionName</span>
                    <div class="bg-node-toggle"></div>
                </div>
                <div class="bg-workflow-node">
                    <span class="bg-node-text">ActionName</span>
                    <div class="bg-node-toggle"></div>
                </div>
                <div class="bg-workflow-node">
                    <span class="bg-node-text">Trigger</span>
                    <div class="bg-node-toggle"></div>
                </div>
            </div>
            
            <div class="rita-container">
                <div class="rita-chat-interface">
                    <div class="rita-chat-content">
                        <div class="rita-header">
                            <h2 class="rita-title season-heading">Ask Rita</h2>
                            <p class="rita-subtitle">How can I help you today?</p>
                        </div>
                        <div class="rita-input-container">
                            <input type="text" class="rita-input" placeholder="Message Rita..." disabled style="cursor: not-allowed;">
                            <button class="rita-send-btn" disabled style="cursor: not-allowed;">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                company: document.getElementById('company').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    window.location.href = '/pages/step2.html';
                } else {
                    const errorData = await response.json();
                    alert(errorData.message || 'Registration failed. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            }
        });
    </script>
</body>
</html>
