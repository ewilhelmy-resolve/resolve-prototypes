version: '3.8'

services:
  # Frontend nginx server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./jarvis.html:/usr/share/nginx/html/jarvis.html:ro
      - ./analytics-dashboard.html:/usr/share/nginx/html/analytics-dashboard.html:ro
      - ./analytics-login.html:/usr/share/nginx/html/analytics-login.html:ro
      - ./components:/usr/share/nginx/html/components:ro
      - ./styles:/usr/share/nginx/html/styles:ro
      - ./logo.svg:/usr/share/nginx/html/logo.svg:ro
    restart: unless-stopped
    networks:
      - resolve-network

  # Backend Node.js server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=production
      - PORT=8082
      - DATABASE_PATH=/app/data/resolve-onboarding.db
    volumes:
      - ./data:/app/data
      - ./sample-tickets.csv:/app/sample-tickets.csv:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - resolve-network

  # Test runner (only runs when explicitly called)
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./tests:/app/tests:ro
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
      - ./sample-tickets.csv:/app/sample-tickets.csv:ro
    environment:
      - BASE_URL=http://backend:8082
      - HEADLESS=true
    profiles:
      - test
    networks:
      - resolve-network
    command: >
      sh -c "
        echo 'Waiting for backend to be ready...';
        sleep 5;
        echo 'Running E2E tests...';
        npx playwright test --reporter=list,html --retries=2
      "

networks:
  resolve-network:
    driver: bridge

volumes:
  data: