version: '3.8'

services:
  app-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "${TEST_PORT:-10000}:8080"
    environment:
      - NODE_ENV=test
      - PORT=8080
      - DATABASE_TYPE=sqlite
      - DATABASE_PATH=/app/test-database.db
    volumes:
      - ./test-database.db:/app/test-database.db
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - test-network

networks:
  test-network:
    driver: bridge