version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "9000:9000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=9000
      - NODE_ENV=development
    restart: unless-stopped
    container_name: resolve-backend