apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
data:
  env-config.js: |
    window.ENV_CONFIG = {
      KEYCLOAK_URL: "{{ .Values.keycloak.url }}",
      KEYCLOAK_REALM: "{{ .Values.keycloak.realm }}",
      KEYCLOAK_CLIENT_ID: "{{ .Values.keycloak.clientId }}"
    };
