{{- if .Values.route53.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "frontend.fullname" . }}-route53-cleanup
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-delete
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: route53-dns-cleanup
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "frontend.fullname" . }}-route53-dns
      containers:
      - name: dns-cleanup
        image: amazon/aws-cli:latest
        resources:
          requests:
            memory: "64Mi"
            cpu: "10m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        command:
        - sh
        - -c
        - |
          set -e

          HOSTNAME="{{ .Values.ingress.host }}"
          HOSTED_ZONE_ID="{{ .Values.route53.hostedZoneId }}"

          echo "Checking for Route53 DNS record: $HOSTNAME"

          # Check if record exists
          RECORD_SET=$(aws route53 list-resource-record-sets \
            --hosted-zone-id "$HOSTED_ZONE_ID" \
            --query "ResourceRecordSets[?Name=='${HOSTNAME}.']" \
            --output json)

          RECORD_COUNT=$(echo "$RECORD_SET" | jq length)

          if [ "$RECORD_COUNT" -eq 0 ]; then
            echo "DNS record does not exist, nothing to clean up"
            exit 0
          fi

          echo "Found DNS record, retrieving details..."

          # Get record type and value
          RECORD_TYPE=$(echo "$RECORD_SET" | jq -r '.[0].Type')
          RECORD_TTL=$(echo "$RECORD_SET" | jq -r '.[0].TTL')

          if [ "$RECORD_TYPE" = "CNAME" ]; then
            RECORD_VALUE=$(echo "$RECORD_SET" | jq -r '.[0].ResourceRecords[0].Value')

            echo "Deleting CNAME record: $HOSTNAME -> $RECORD_VALUE"

            # Delete CNAME record
            cat > /tmp/delete-batch.json <<EOF
          {
            "Changes": [
              {
                "Action": "DELETE",
                "ResourceRecordSet": {
                  "Name": "$HOSTNAME",
                  "Type": "CNAME",
                  "TTL": $RECORD_TTL,
                  "ResourceRecords": [
                    {
                      "Value": "$RECORD_VALUE"
                    }
                  ]
                }
              }
            ]
          }
          EOF

            aws route53 change-resource-record-sets \
              --hosted-zone-id "$HOSTED_ZONE_ID" \
              --change-batch file:///tmp/delete-batch.json

            echo "DNS record deleted successfully!"
          else
            echo "Record type is $RECORD_TYPE (not CNAME), skipping deletion"
            echo "Manual cleanup may be required"
          fi
{{- end }}
