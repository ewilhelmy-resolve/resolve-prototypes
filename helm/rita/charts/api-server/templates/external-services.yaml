{{- if .Values.externalServices.postgres.host }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-rita
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "api-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: external-service
spec:
  type: ExternalName
  externalName: {{ .Values.externalServices.postgres.host }}
  ports:
  - port: {{ .Values.externalServices.postgres.port }}
    targetPort: {{ .Values.externalServices.postgres.port }}
    protocol: TCP
    name: postgres
{{- end }}

