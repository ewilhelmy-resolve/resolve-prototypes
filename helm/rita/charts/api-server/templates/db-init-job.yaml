{{- if .Values.dbInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "api-server.fullname" . }}-db-init-{{ .Release.Revision }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "api-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-init
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-timeout: "120s"
spec:
  backoffLimit: {{ .Values.dbInit.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.dbInit.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "api-server.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db-init
    spec:
      restartPolicy: Never
      containers:
      - name: db-init
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        workingDir: /app/packages/api-server
        command:
        - node
        - -e
        - |
          const pg = require('pg');

          async function main() {
            const adminUrl = process.env.RDS_ADMIN_URL;
            const databaseUrl = process.env.DATABASE_URL;

            if (!adminUrl) {
              console.error('RDS_ADMIN_URL is required');
              process.exit(1);
            }
            if (!databaseUrl) {
              console.error('DATABASE_URL is required');
              process.exit(1);
            }

            // Extract customer DB name from DATABASE_URL
            const url = new URL(databaseUrl);
            const dbName = url.pathname.slice(1);
            if (!dbName) {
              console.error('No database name found in DATABASE_URL');
              process.exit(1);
            }

            // Validate db name to prevent injection
            if (!/^[a-zA-Z0-9_-]+$/.test(dbName)) {
              console.error('Invalid database name:', dbName);
              process.exit(1);
            }

            console.log('Ensuring database "' + dbName + '" exists...');

            // Connect to postgres admin DB
            const client = new pg.Client({ connectionString: adminUrl });
            await client.connect();

            try {
              const res = await client.query(
                'SELECT 1 FROM pg_database WHERE datname = $1',
                [dbName]
              );

              if (res.rowCount === 0) {
                await client.query('CREATE DATABASE "' + dbName + '"');
                console.log('Database "' + dbName + '" created');
              } else {
                console.log('Database "' + dbName + '" already exists');
              }
            } finally {
              await client.end();
            }

            // Enable pgvector on customer DB using admin creds
            const adminParsed = new URL(adminUrl);
            adminParsed.pathname = '/' + dbName;
            const extClient = new pg.Client({ connectionString: adminParsed.toString() });
            await extClient.connect();
            try {
              await extClient.query('CREATE EXTENSION IF NOT EXISTS vector');
              console.log('pgvector extension verified');
            } finally {
              await extClient.end();
            }

            console.log('db-init complete');
          }

          main().catch(err => {
            console.error('db-init failed:', err);
            process.exit(1);
          });
        env:
        - name: RDS_ADMIN_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "api-server.fullname" . }}-secret
              key: RDS_ADMIN_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "api-server.fullname" . }}-secret
              key: DATABASE_URL
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
{{- end }}
