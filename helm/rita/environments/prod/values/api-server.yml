# Production environment values for API Server

namespace: ""  # Overridden per customer via helmfile --state-values-set namespace=<customer>

replicaCount: 1

resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

# Non-sensitive configuration
config:
  nodeEnv: production
  port: "3000"

# External services (shared infrastructure)
externalServices:
  postgres:
    host: ""  # RDS endpoint, set per deployment
    port: 5432
  rabbitmq:
    host: ""  # Existing RabbitMQ host
    port: 5672
  consul:
    host: ""  # Existing Consul host
    port: 8500
  valkey:
    host: ""  # Existing Valkey host
    port: 6379

# Database initialization (creates database if not exists)
dbInit:
  enabled: true
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400

# Migration job
migration:
  enabled: true
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Production hardening
networkPolicy:
  enabled: true

pdb:
  enabled: true
  minAvailable: 1

resourceQuota:
  enabled: true
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "20"
