apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_PASSWORD: {{ .Values.adminPassword | quote }}
  DB_PASSWORD: {{ .Values.database.password | quote }}
