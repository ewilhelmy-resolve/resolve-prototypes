namespace: rita-dev

image:
  repository: ""  # Set via helmfile from ECR_REGISTRY env var
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  name: api-server

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

healthCheck:
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 2

# Non-sensitive configuration
config:
  nodeEnv: production
  port: "3000"
  keycloakUrl: ""  # Set via environment values
  keycloakRealm: ""  # Set via environment values
  consulAddr: ""  # Set via environment values

# Sensitive configuration (injected via helmfile)
secrets:
  databaseUrl: ""
  rabbitmqUrl: ""
  keycloakIssuer: ""
  consulToken: ""
  valkeyUrl: ""
  automationWebhookUrl: ""
  automationAuth: ""
  rdsAdminUrl: ""
  rollbarAccessToken: ""
  rollbarHashSalt: ""

# External services
externalServices:
  postgres:
    host: ""  # Set via environment values
    port: 5432
  rabbitmq:
    host: ""  # Set via environment values
    port: 5672
  consul:
    host: ""  # Set via environment values
    port: 8500
  valkey:
    host: ""  # Set via environment values
    port: 6379

# Database migration job
migration:
  enabled: false  # Disabled for initial deployment
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400

# Database initialization (creates database if not exists)
dbInit:
  enabled: false
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400

# Autoscaling (disabled by default for dev)
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Deployment strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Network policy (disabled by default)
networkPolicy:
  enabled: false

# Pod disruption budget (disabled by default)
pdb:
  enabled: false
  minAvailable: 1

# Resource quota per namespace (disabled by default)
resourceQuota:
  enabled: false
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "20"
