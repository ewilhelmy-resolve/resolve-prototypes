apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api-server.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "api-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "api-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "api-server.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      containers:
      - name: api-server
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: {{ include "api-server.fullname" . }}-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: {{ include "api-server.fullname" . }}-config
              key: PORT
        - name: KEYCLOAK_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "api-server.fullname" . }}-config
              key: KEYCLOAK_URL
        - name: KEYCLOAK_REALM
          valueFrom:
            configMapKeyRef:
              name: {{ include "api-server.fullname" . }}-config
              key: KEYCLOAK_REALM
        - name: CONSUL_HTTP_ADDR
          valueFrom:
            configMapKeyRef:
              name: {{ include "api-server.fullname" . }}-config
              key: CONSUL_HTTP_ADDR
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "api-server.fullname" . }}-secret
              key: DATABASE_URL
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "api-server.fullname" . }}-secret
              key: RABBITMQ_URL
        - name: KEYCLOAK_ISSUER
          valueFrom:
            secretKeyRef:
              name: {{ include "api-server.fullname" . }}-secret
              key: KEYCLOAK_ISSUER
        - name: CONSUL_HTTP_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "api-server.fullname" . }}-secret
              key: CONSUL_HTTP_TOKEN
        - name: VALKEY_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "api-server.fullname" . }}-secret
              key: VALKEY_URL
        - name: AUTOMATION_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "api-server.fullname" . }}-secret
              key: AUTOMATION_WEBHOOK_URL
        - name: AUTOMATION_AUTH
          valueFrom:
            secretKeyRef:
              name: {{ include "api-server.fullname" . }}-secret
              key: AUTOMATION_AUTH
        {{- if .Values.healthCheck.liveness.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.healthCheck.liveness.path }}
            port: http
          initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
          failureThreshold: {{ .Values.healthCheck.liveness.failureThreshold }}
        {{- end }}
        {{- if .Values.healthCheck.readiness.enabled }}
        readinessProbe:
          httpGet:
            path: {{ .Values.healthCheck.readiness.path }}
            port: http
          initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
          failureThreshold: {{ .Values.healthCheck.readiness.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
