{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "api-server.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "api-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "api-server.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: frontend
    ports:
    - port: {{ .Values.service.targetPort }}
      protocol: TCP
  egress:
  # DNS
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # External services (postgres, rabbitmq, consul, valkey, HTTPS)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - port: 5432
      protocol: TCP
    - port: 5672
      protocol: TCP
    - port: 8500
      protocol: TCP
    - port: 6379
      protocol: TCP
    - port: 443
      protocol: TCP
{{- end }}
