{{- if .Values.route53.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "frontend.fullname" . }}-route53-dns
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 900  # 15 minutes total timeout
  template:
    metadata:
      labels:
        app: route53-dns-setup
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "frontend.fullname" . }}-route53-dns
      initContainers:
      - name: wait-for-alb
        image: bitnami/kubectl:latest
        command:
        - sh
        - -c
        - |
          set -e
          echo "Waiting for ALB to be provisioned..."
          MAX_WAIT=600  # 10 minutes
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            ALB_DNS=$(kubectl get ingress {{ include "frontend.fullname" . }} -n {{ .Values.namespace }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")

            if [ -n "$ALB_DNS" ]; then
              echo "ALB provisioned: $ALB_DNS"
              echo "$ALB_DNS" > /tmp/alb-dns.txt
              exit 0
            fi

            echo "ALB not ready, waiting... ($ELAPSED/$MAX_WAIT seconds)"
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          echo "ERROR: Timeout waiting for ALB to be provisioned after $MAX_WAIT seconds"
          exit 1
        volumeMounts:
        - name: shared-data
          mountPath: /tmp
      containers:
      - name: dns-setup
        image: amazon/aws-cli:latest
        command:
        - sh
        - -c
        - |
          set -e

          ALB_DNS=$(cat /tmp/alb-dns.txt)
          echo "Using ALB DNS: $ALB_DNS"

          HOSTNAME="{{ .Values.ingress.host }}"
          HOSTED_ZONE_ID="{{ .Values.route53.hostedZoneId }}"

          echo "Creating Route53 CNAME record for $HOSTNAME -> $ALB_DNS"

          # Check if record exists
          RECORD_EXISTS=$(aws route53 list-resource-record-sets \
            --hosted-zone-id "$HOSTED_ZONE_ID" \
            --query "ResourceRecordSets[?Name=='${HOSTNAME}.']" \
            --output json | jq length)

          if [ "$RECORD_EXISTS" -gt 0 ]; then
            echo "DNS record exists, updating..."
            ACTION="UPSERT"
          else
            echo "DNS record doesn't exist, creating..."
            ACTION="UPSERT"
          fi

          # Create/update CNAME record
          cat > /tmp/change-batch.json <<EOF
          {
            "Changes": [
              {
                "Action": "$ACTION",
                "ResourceRecordSet": {
                  "Name": "$HOSTNAME",
                  "Type": "CNAME",
                  "TTL": 300,
                  "ResourceRecords": [
                    {
                      "Value": "$ALB_DNS"
                    }
                  ]
                }
              }
            ]
          }
          EOF

          aws route53 change-resource-record-sets \
            --hosted-zone-id "$HOSTED_ZONE_ID" \
            --change-batch file:///tmp/change-batch.json

          echo "DNS record created/updated successfully!"
          echo "URL: https://$HOSTNAME"
        volumeMounts:
        - name: shared-data
          mountPath: /tmp
      volumes:
      - name: shared-data
        emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "frontend.fullname" . }}-route53-dns
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
  {{- if .Values.route53.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.route53.serviceAccount.annotations | nindent 4 }}
  {{- end }}
---
{{- if .Values.route53.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "frontend.fullname" . }}-route53-dns
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "frontend.fullname" . }}-route53-dns
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "frontend.fullname" . }}-route53-dns
subjects:
- kind: ServiceAccount
  name: {{ include "frontend.fullname" . }}-route53-dns
  namespace: {{ .Values.namespace }}
{{- end }}
{{- end }}
