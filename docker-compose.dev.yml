networks:
  resolve-network:
    driver: bridge

services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=development
      - PORT=8082
      - DATABASE_PATH=/app/data/resolve-onboarding.db
      - WEBHOOK_ENABLED=true
    volumes:
      # Mount source code for hot-reloading
      - .:/app
      - /app/node_modules
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    command: npm run dev
    networks:
      - resolve-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s